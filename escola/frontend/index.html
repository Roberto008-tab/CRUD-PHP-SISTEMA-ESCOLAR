<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduGestor - Sistema Escolar Seguro</title>
    <meta name="description" content="Sistema de Gestão Escolar com segurança avançada - RBAC, PBKDF2, AES-GCM, auditoria" />
    <meta name="author" content="EduGestor" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- ============================================================
         SEGURANÇA — Headers de Proteção — Fase 1
         CRIT-3: CSP sem 'unsafe-eval', nonce-based inline scripts
         CRIT-4: HTTPS enforcement via JS redirect
         ============================================================ -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />
    <!-- CRIT-3: CSP corrigido — removido 'unsafe-eval', mantido 'unsafe-inline' só para styles (Tailwind) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://localhost:8080 ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />    <!-- CRIT-4: HTTPS enforcement — redireciona HTTP para HTTPS -->
    <script>
      if(location.protocol==='http:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){location.replace('https://'+location.host+location.pathname+location.search);}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- ============================================================
         SEGURANÇA: NUCLEAR Banner Removal
         Remove QUALQUER elemento injetado fora de #root
         ============================================================ -->
    <script>
      (function(){
        'use strict';
        function nuclearClean(){
          var body=document.body;
          if(!body)return;
          var children=body.children;
          for(var i=children.length-1;i>=0;i--){
            var el=children[i];
            var tag=el.tagName;
            if(el.id==='root')continue;
            if(tag==='SCRIPT'||tag==='STYLE'||tag==='LINK'||tag==='NOSCRIPT'||tag==='META')continue;
            el.parentNode.removeChild(el);
          }
          var iframes=document.querySelectorAll('iframe');
          for(var j=0;j<iframes.length;j++){
            if(!document.getElementById('root')||!document.getElementById('root').contains(iframes[j])){
              iframes[j].parentNode.removeChild(iframes[j]);
            }
          }
        }
        if(document.body)nuclearClean();
        else document.addEventListener('DOMContentLoaded',nuclearClean);
        setTimeout(nuclearClean,0);
        setTimeout(nuclearClean,100);
        setTimeout(nuclearClean,300);
        setTimeout(nuclearClean,500);
        setTimeout(nuclearClean,1000);
        setTimeout(nuclearClean,2000);
        setTimeout(nuclearClean,3000);
        setTimeout(nuclearClean,5000);
        setTimeout(nuclearClean,8000);
        setInterval(nuclearClean,3000);
        if(typeof MutationObserver!=='undefined'){
          var obs=new MutationObserver(function(mutations){
            for(var m=0;m<mutations.length;m++){
              var added=mutations[m].addedNodes;
              for(var n=0;n<added.length;n++){
                var node=added[n];
                if(node.nodeType!==1)continue;
                if(node.id==='root')continue;
                var tag=node.tagName;
                if(tag==='SCRIPT'||tag==='STYLE'||tag==='LINK'||tag==='NOSCRIPT')continue;
                if(node.parentNode&&node.parentNode===document.body){
                  node.parentNode.removeChild(node);
                }
              }
            }
          });
          function startObs(){
            if(document.body)obs.observe(document.body,{childList:true});
          }
          if(document.body)startObs();
          else document.addEventListener('DOMContentLoaded',startObs);
        }
      })();
    </script>
  </body>
</html>
